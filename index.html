// ── LEGGI STATO DA GOOGLE SHEET ───────────────────────────────────────────────
function parseSheetData(raw) {
  try {
    const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
    const rows = json.table.rows;
    if (!rows || rows.length === 0) return null;
    const get = (cells, i) => cells[i]?.v ?? "";
    // Leggi tutte le righe e prendi l'ultima per ogni fase
    const byFase = {};
    for (const row of rows) {
      const cells = row.c || [];
      const fase = get(cells, 2);
      if (fase) byFase[fase] = {
        run_id:        get(cells, 0),
        campagna:      get(cells, 1),
        fase,
        stato:         get(cells, 3),
        dettaglio:     get(cells, 4),
        timestamp:     get(cells, 5),
        aziende_tot:   get(cells, 6),
        url_pendenti:  get(cells, 7),
        errori_aperti: get(cells, 8),
        leads_lemlist: get(cells, 9),
      };
    }
    // Ultima riga per run_id e campagna globali
    const last = rows[rows.length - 1];
    const lc = last.c || [];
    return {
      run_id:    get(lc, 0),
      campagna:  get(lc, 1),
      byFase,
      leads_lemlist: get(lc, 9),
    };
  } catch(e) { return null; }

function App() {
  const [tab, setTab]               = useState("run");
  const [runAttivo, setRunAttivo]   = useState(false);
  const [runId, setRunId]           = useState(null);
  const [runStart, setRunStart]     = useState(null);
  const [campagna, setCampagna]     = useState("Impianti & Automazioni Nord");
  const [fasi, setFasi]             = useState(FASI_INIT);
  const [log, setLog]               = useState([]);
  const [urls, setUrls]             = useState(DEFAULT_URLS);
  const [errori, setErrori]         = useState(DEFAULT_ERRORI);
  const [execs, setExecs]           = useState([]);
  const [manualUrl, setManualUrl]   = useState({});
  const [toast, setToast]           = useState(null);
  const [clock, setClock]           = useState(new Date());
  const [loading, setLoading]       = useState({});
  const [csvFile, setCsvFile]       = useState(null);
  const [sheetStatus, setSheetStatus] = useState(null);
  const [lastSync, setLastSync]     = useState(null);
  const [nextSyncIn, setNextSyncIn]       = useState(30);
  const [splash, setSplash] = useState(true);
  const [menuOpen, setMenuOpen] = useState(false);
  const [showReviewTool, setShowReviewTool] = useState(false);
  const [reviewBlobUrl, setReviewBlobUrl] = useState(null);
  const [counters, setCounters] = useState({az_input:null, az_output:null, exec:null, scartati:null, mail_ok:null, mail_no:null});
  const [dipLastCount, setDipLastCount]   = useState(null);  // n righe totali foglio dipendenti
  const [dipLastChange, setDipLastChange] = useState(null);  // timestamp ultimo cambio
  const [dipIdle, setDipIdle]             = useState(false); // true = fermo da 90
  const [dupCheck, setDupCheck]           = useState(null);  // null | {ok:true} | {ok:false, duplicati:[...]}

  const [embedSheet, setEmbedSheet] = useState(null); // {url, label}
  const [syncErr, setSyncErr]       = useState(false);
  const [prospectingRows, setProspectingRows] = useState([]);
  const [azSenzaSito, setAzSenzaSito] = useState([]);
  const companyCeckFiredRef  = React.useRef(false);
  const [prospectingTab, setProspectingTab]   = useState("tabella"); // "tabella" | "sheets"
  const [prospectingSelected, setProspectingSelected] = useState(()=>{
    try { const s=localStorage.getItem('grizzly_selected'); return s?new Set(JSON.parse(s)):new Set(); } catch(e){ return new Set(); }
  });
  const fileRef = useRef();

  // ── Orologio ──────────────────────────────────────────────────────────────
  useEffect(() => { const t = setInterval(()=>{ setClock(new Date()); setNextSyncIn(n=>n>0?n-1:30); },1000); return ()=>clearInterval(t); }, []);

  // ── Leggi URL da valutare dal foglio URL_da_valutare ─────────────────────────
  const fetchUrlSheet = useCallback(async () => {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${URL_SHEET_ID}/gviz/tq?tqx=out:json&headers=1&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
      const rows = (json.table.rows || []).slice(1);
      const cols = json.table.cols.map(c => c.label || "");

                                    </td>
                                    <td style={{padding:"5px 10px",color:C.muted,fontSize:9}}>
                                      {r.f?<a href={r.f.startsWith('http')?r.f:'https://'+r.f} target="_blank" style={{color:C.muted}} onClick={e=>e.stopPropagation()}>{r.f.replace(/https?:\/\/(www\.)?/,"").slice(0,30)}</a>:"—"}
                                    </td>
                                    <td style={{padding:"5px 10px",color:C.muted,fontSize:9,whiteSpace:"nowrap"}}>{r.s||"—"}</td>
                                  </tr>
                                ))
                              }
                            </tbody>
                          </table>
                        </div>
                      )}
                      {/* Google Sheets iframe */}
                      {prospectingTab==="sheets"&&(
                        <div style={{overflow:"hidden",height:320,borderRadius:5,border:`1px solid rgba(59,130,246,0.2)`}}>
                          <iframe
                            src={`https://docs.google.com/spreadsheets/d/${URL_SHEET_ID}/edit?gid=0&rm=minimal`}
                            style={{width:"133%",height:"133%",border:"none",transform:"scale(0.75)",transformOrigin:"top left"}}
                            title="Prospecting output"
                          />
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── IFRAME ── */}
                  {embedSheet&&(
                    <div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",padding:"6px 0 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span>{embedSheet.label}</span>
                        <div style={{display:"flex",gap:6}}>
                          <a href={embedSheet.editUrl} target="_blank" style={{textDecoration:"none"}}>
                            <button style={{fontSize:10,fontWeight:600,color:C.accent,background:C.accentDim,border:`1px solid rgba(59,130,246,.3)`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>✏ Modifica</button>
                          </a>
                          <button onClick={closeSheet} style={{fontSize:10,color:C.muted,background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>✕ Chiudi</button>
                        </div>
                      </div>
                      <div style={{overflow:"hidden",height:320,borderRadius:6,border:`1px solid ${C.border}`}}>
                        <iframe src={embedSheet.url} style={{width:"133%",height:"133%",border:"none",transform:"scale(0.75)",transformOrigin:"top left"}} title={embedSheet.label}/>
                      </div>
                    </div>
                  )}

                  {/* ── LOG LIVE ── */}
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",maxHeight:220,overflowY:"auto"}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",padding:"7px 14px",borderBottom:`1px solid ${C.border}`}}>Log live</div>
                    {log.length===0
                      ?<div style={{padding:14,textAlign:"center",color:C.muted,fontSize:11}}>Nessun evento ancora</div>
                      :log.map((ev,i)=>{
                        const ec={ok:{c:C.green,icon:"✓"},warn:{c:C.yellow,icon:"⚠"},error:{c:C.red,icon:"✕"},info:{c:C.accent,icon:"i"},attesa:{c:C.orange,icon:"⏸"}}[ev.tipo]||{c:C.muted,icon:"·"};
                        return (
                          <div key={i} className="hovrow" style={{display:"flex",alignItems:"flex-start",gap:10,padding:"7px 14px",borderBottom:i<log.length-1?`1px solid ${C.border}`:"none"}}>
                            <div style={{width:14,height:14,borderRadius:"50%",background:`${ec.c}18`,border:`1px solid ${ec.c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:ec.c,flexShrink:0,marginTop:2}}>{ec.icon}</div>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.muted,whiteSpace:"nowrap",flexShrink:0,marginTop:1}}>{fmtTime(ev.ts)}</span>
                            <span style={{fontSize:11,color:ev.tipo==="error"?C.red:ev.tipo==="attesa"?C.orange:ev.tipo==="warn"?C.yellow:C.text,lineHeight:1.4}}>{ev.msg}</span>
                          </div>
                        );
                      })
                    }
                  </div>

                </div>
              </>
            )}
          </div>
        )}

        
        {/* ══ ERRORI ══ */}
        {tab==="errori"&&(
          <div style={{padding:"16px 20px",animation:"fadeIn .2s ease"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div><div style={{fontSize:18,fontWeight:700,color:C.textHi,marginBottom:4}}>Errori pipeline</div><div style={{fontSize:12,color:C.muted}}>Da Prospecting_output ed Email_verificate</div></div>
              <div style={{display:"flex",gap:8}}><Tag color={C.red} bg={C.redDim}>{openErrors} aperti</Tag><Tag color={C.green} bg={C.greenDim}>{errori.filter(e=>e.stato==="risolto").length} risolti</Tag></div>
            </div>
            {errori.map(err=>{
              const done=err.stato==="risolto";
              const tc={INVALID_DOMAIN:{c:C.yellow,bg:C.yellowDim,icon:"🔗"},MISSING_DEAL_ID:{c:C.red,bg:C.redDim,icon:"🔧"}}[err.tipo]||{c:C.muted,bg:"transparent",icon:"?"};
              return (
                <div key={err.id} className="hcard" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:10,opacity:done?.5:1}}>
                  <div style={{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:14}}>
                    <div style={{width:36,height:36,background:tc.bg,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{tc.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontWeight:600,fontSize:13,color:C.textHi}}>{err.azienda}</span>
                        <Tag color={tc.c} bg={tc.bg}>{err.tipo}</Tag>
                        <span style={{fontSize:10,color:C.muted}}>{err.scenario}</span>
                      </div>
                      <div style={{fontSize:11,color:C.muted,lineHeight:1.5,marginBottom:8}}>{err.msg}</div>
                      {!done&&<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px"}}><div style={{fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:C.muted,marginBottom:4}}>COME RISOLVERE</div><div style={{fontSize:11,color:C.text,lineHeight:1.6}}>{err.fix}</div></div>}
                    </div>
                    {!done?<Btn color={C.green} bg={C.greenDim} border="rgba(34,197,94,.4)" onClick={()=>closeError(err.id)}>✓ Risolto</Btn>:<Tag color={C.green} bg={C.greenDim}>✓ Chiuso</Tag>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ LOG ══ */}
        {tab==="log"&&(
          <div style={{padding:24,animation:"fadeIn .2s ease"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",marginBottom:12}}>Log eventi {runId?`— ${runId}`:"— nessun run attivo"}</div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
              {log.length===0?<div style={{padding:20,textAlign:"center",color:C.muted,fontSize:11}}>Nessun evento — avvia un run</div>
               :log.map((ev,i)=>{
                const ec={ok:{c:C.green,icon:"✓"},warn:{c:C.yellow,icon:"⚠"},error:{c:C.red,icon:"✕"},info:{c:C.accent,icon:"i"},attesa:{c:C.orange,icon:"⏸"}}[ev.tipo]||{c:C.muted,icon:"·"};
                return (
                  <div key={i} className="hovrow" style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 16px",borderBottom:i<log.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:`${ec.c}18`,border:`1px solid ${ec.c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:ec.c,flexShrink:0,marginTop:2}}>{ec.icon}</div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.muted,whiteSpace:"nowrap",flexShrink:0,marginTop:1}}>{fmtTime(ev.ts)}</span>
                    <span style={{fontSize:12,color:ev.tipo==="error"?C.red:ev.tipo==="attesa"?C.orange:ev.tipo==="warn"?C.yellow:C.text,lineHeight:1.5}}>{ev.msg}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:20,right:20,zIndex:999,background:C.surfaceHi,border:`1px solid ${C.borderHi}`,borderLeft:`3px solid ${toast.color}`,borderRadius:6,padding:"11px 16px",fontSize:12,color:C.textHi,animation:"slideUp .2s ease",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          {toast.msg}
        </div>
      )}
    </div>

      {showReviewTool&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:1000,background:"rgba(0,0,0,0.85)",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"#0d1117",borderBottom:"1px solid rgba(255,255,255,0.1)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:14}}>🔍</span>
              <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Rivedi URL ambigui</span>
              <span style={{fontSize:11,color:"#4a6080",background:"rgba(255,255,255,0.05)",padding:"2px 8px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>Prospecting output</span>
            </div>
            <button onClick={()=>setShowReviewTool(false)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:6,padding:"5px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Chiudi</button>
          </div>
          {reviewBlobUrl&&<iframe src={reviewBlobUrl} style={{flex:1,border:"none",width:"100%"}} sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"/>}
        </div>
      )}
  );
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
