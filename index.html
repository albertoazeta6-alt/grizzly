// ── LEGGI STATO DA GOOGLE SHEET ───────────────────────────────────────────────
function parseSheetData(raw) {
  try {
    const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
    const rows = json.table.rows;
    if (!rows || rows.length === 0) return null;
    const get = (cells, i) => cells[i]?.v ?? "";
    // Leggi tutte le righe e prendi l'ultima per ogni fase
    const byFase = {};
    for (const row of rows) {
      const cells = row.c || [];
      const fase = get(cells, 2);
      if (fase) byFase[fase] = {
        run_id:        get(cells, 0),
        campagna:      get(cells, 1),
        fase,
        stato:         get(cells, 3),
        dettaglio:     get(cells, 4),
        timestamp:     get(cells, 5),
        aziende_tot:   get(cells, 6),
        url_pendenti:  get(cells, 7),
        errori_aperti: get(cells, 8),
        leads_lemlist: get(cells, 9),
      };
    }
    // Ultima riga per run_id e campagna globali
    const last = rows[rows.length - 1];
    const lc = last.c || [];
    return {
      run_id:    get(lc, 0),
      campagna:  get(lc, 1),
      byFase,
      leads_lemlist: get(lc, 9),
    };
  } catch(e) { return null; }
}

  const fetchUrlSheet = useCallback(async () => {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${URL_SHEET_ID}/gviz/tq?tqx=out:json&headers=1&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
      const rows = (json.table.rows || []).slice(1);
      const cols = json.table.cols.map(c => c.label || "");
      if (rows.length === 0) return;
      const get = (cells, i) => cells[i]?.v ?? "";
      // Mappa indici colonne — struttura esatta: Title_Phantom | Ragione sociale | LinkedinURL_Phantom | LinkedinURL_Easybusiness | LinkiedinURL_da_ricercare | Sito web
      const iRs   = cols.findIndex(c => c.toLowerCase().includes("ragione"));
      const iSito = cols.findIndex(c => c.toLowerCase().includes("sito"));
      const iPh   = cols.findIndex(c => /linkedinurl_phantom/i.test(c));
      const iEb   = cols.findIndex(c => /linkedinurl_easy/i.test(c));
      const iCit  = cols.findIndex(c => c.toLowerCase().includes("citt"));
      const iFat  = cols.findIndex(c => c.toLowerCase().includes("fatturato"));
      const parsed = rows.map((row, i) => {
        const c = row.c || [];
        return {
          id: i + 1,
          ragione_sociale: get(c, iRs),
          sito:            iSito >= 0 ? get(c, iSito) : "",
          url_phantom:     iPh   >= 0 ? get(c, iPh)   : "",
          url_easybusiness:iEb   >= 0 ? get(c, iEb)   : "",
          citta:           iCit  >= 0 ? get(c, iCit)  : "",
          fatturato:       iFat  >= 0 ? get(c, iFat)  : "",
          stato:           "pending",
        };
      }).filter(r => r.ragione_sociale && !/^ragione.?sociale$/i.test(r.ragione_sociale.trim()));
      if (parsed.length > 0) {
        setUrls(parsed);
      }
    } catch(e) {
      // fallback silenzioso — usa i dati statici
    }
  }, []);

          // Non resettiamo dipIdle: una volta comparso il banner resta visibile
        } else if (prev === null) {

        }
        return total;
      });
    } catch(e) {}
  }, []);

  const fetchCounters = useCallback(async () => {
    // colIdx: indice colonna 0-based da contare (valori non vuoti, escluso header)
    const fetchCol = async (id, gid, colIdx) => {
      try {
        const COL_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
        const col = COL_LETTERS[colIdx];
        const q = encodeURIComponent(`select count(${col}) where ${col} is not null label count(${col}) 'n'`);
        const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&tq=${q}&headers=1&t=${Date.now()}`;
        const res = await fetch(url);
        const raw = await res.text();
        const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
        return json.table?.rows?.[0]?.c?.[0]?.v ?? 0;
      } catch(e) { return null; }
    };
    const fetchColContains = async (id, gid, colIdx, keyword) => {
      try {
        const COL_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
        const col = COL_LETTERS[colIdx];
        const q = encodeURIComponent(`select count(${col}) where lower(${col}) contains '${keyword.toLowerCase()}' label count(${col}) 'n'`);
        const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&tq=${q}&headers=1&t=${Date.now()}`;
        const res = await fetch(url);
        const raw = await res.text();
        const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
        return json.table?.rows?.[0]?.c?.[0]?.v ?? 0;
      } catch(e) { return null; }
    };
    const [az_input, az_output, exec, scartati, mail_ok, mail_no] = await Promise.all([
      fetchCol("1Xk8CuYjriLbsxqafpTkPKSIGyApUAnX7vj7TaRlLHEc","0", 1),                              // col B — ragione sociale
      fetchColContains("1kpegNLu1ylOcHBrt1xZ5RipVIgKvWkGzZQzaG35otLE","0", 4, "linkedin"),           // col E — url company page (solo linkedin)
      fetchCol("1kpegNLu1ylOcHBrt1xZ5RipVIgKvWkGzZQzaG35otLE","0", 3),                              // col D — easybusiness
      fetchCol("1kpegNLu1ylOcHBrt1xZ5RipVIgKvWkGzZQzaG35otLE","0", 2),                              // col C — phantom
      fetchCol("1x8C39EaD1PzKQ0LJ9RsusIxAa9eJKmRwMxzPVj2Flng","0", 10),                             // col K — con email
      fetchCol("1x8C39EaD1PzKQ0LJ9RsusIxAa9eJKmRwMxzPVj2Flng","401214721", 4),                      // col E — senza email
    ]);
    setCounters({az_input, az_output, exec, scartati, mail_ok, mail_no});
  }, []);

  const fetchProspecting = useCallback(async () => {
    try {
      const q = encodeURIComponent(`select B,E,F,S where B is not null`);
      const url = `https://docs.google.com/spreadsheets/d/${URL_SHEET_ID}/gviz/tq?tqx=out:json&gid=0&tq=${q}&headers=1&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
      const rows = (json.table?.rows || []).map(r => ({
        b: r?.c?.[0]?.v || "",
        e: r?.c?.[1]?.v || "",
        f: r?.c?.[2]?.v || "",

  const fetchAzSenzaSito = useCallback(async () => {
    try {
      const INPUT_SHEET_ID = "1Xk8CuYjriLbsxqafpTkPKSIGyApUAnX7vj7TaRlLHEc";
      const q = encodeURIComponent(`select B,K where B is not null`);
      const url = `https://docs.google.com/spreadsheets/d/${INPUT_SHEET_ID}/gviz/tq?tqx=out:json&gid=0&tq=${q}&headers=1&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
      const mancanti = (json.table?.rows || [])
        .map(r => ({ a: r?.c?.[0]?.v || "", k: r?.c?.[1]?.v || "" }))
        .filter(r => r.a && !r.k?.trim());
      setAzSenzaSito(mancanti);
      if (mancanti.length === 0) {
        // Controllo passato — lancia Company
        await fetch(MAKE.company, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({runId, campagna})});

        showToast("✓ Controllo siti OK — Company avviato");

        pushLog("attesa", `⚠️ ${mancanti.length} aziende senza sito — Company bloccato`);
        showToast(`⚠️ ${mancanti.length} aziende senza sito — correggi prima di procedere`);
      }

  // ── Controllo duplicati Pro.Persona prima di Cerca Email ────────────────────
  const checkDuplicatiProPersona = async () => {
    try {
      const sid = "1y21r84H4Cy2J7hW-bLfXgsD5mfK8KqEcI_apcc_cm-E";
      const q = encodeURIComponent(`select G where G is not null`);
      const url = `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=811728725&tq=${q}&headers=1&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      console.log("RAW:", raw.substring(0, 500));
      const json = JSON.parse(raw.replace(/^[^(]+\(/, "").replace(/\);?$/, ""));
      const values = (json.table?.rows || []).map(r => {
        const v = r?.c?.[0]?.v;
        if (!v) return null;
        // normalizza: lowercase, rimuovi slash finale, rimuovi http/https
        return v.toString().toLowerCase().trim().replace(/\/+$/, '');
      }).filter(Boolean);
      console.log("VALUES:", values.length, values.slice(0,5));
      const counts = {};
      values.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
      const duplicati = Object.entries(counts).filter(([,n]) => n > 1).map(([url, n]) => ({url, n}));
      console.log("DUPLICATI:", duplicati);
      return duplicati.length > 0 ? {ok: false, duplicati} : {ok: true};
    } catch(e) {
      console.error("ERRORE:", e);
      return null;
    }
  };

    // ── Polling Google Sheet ogni 30s ─────────────────────────────────────────
  const fetchSheetStatus = useCallback(async () => {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
      const res = await fetch(url);
      const raw = await res.text();
      const parsed = parseSheetData(raw);
      if (parsed && parsed.run_id) {
        setSheetStatus(parsed);
        setLastSync(new Date());
        setNextSyncIn(30);
        setSyncErr(false);
        // Aggiorna run_id e campagna dall'ultima riga
        if (parsed.run_id) {
          setRunId(parsed.run_id);
          setCampagna(parsed.campagna || campagna);
          setRunAttivo(true);
          if(!runStart) setRunStart(new Date().toISOString());
        }
        // Aggiorna TUTTE le fasi usando l'ultima riga per ciascuna
        if (parsed.byFase) {
          setFasi(prev => prev.map(f => {
            const s = parsed.byFase[f.id];
            if (!s) return {...FASI_INIT.find(fi=>fi.id===f.id), iniziato:null, completato:null};
            const wasStatus = f.stato;
            if (wasStatus !== s.stato) {
              pushLog(s.stato === "attesa_utente" ? "attesa" : s.stato === "completato" ? "ok" : "info",
                `${f.label}: ${s.stato} — ${s.dettaglio}`);
            }
            return {
              ...f,
              stato: s.stato,
              dettaglio: s.dettaglio || f.dettaglio,
              iniziato: f.iniziato || s.timestamp || new Date().toISOString(),
              completato: s.stato === "completato" ? (f.completato || s.timestamp || new Date().toISOString()) : f.completato,
            };
          }));
        }
      } else {
        // Foglio vuoto = nuova run, reset tutte le fasi
        setFasi(FASI_INIT.map(f => ({...f})));
        setRunId(null);
        setRunAttivo(false);
        setRunStart(null);
        setSyncErr(false);
      }

      setSyncErr(true);

  useEffect(() => {
    const importFase  = fasi.find(f => f.id === "import");
    const companyFase = fasi.find(f => f.id === "company");
    // Se company è già in_corso/completato nel foglio → Make ha già ricevuto il webhook
    const companyGiaAvviata = ["in_corso","completato","attesa_utente"].includes(companyFase?.stato);

    if (importFase?.stato === "completato" && !companyCeckFiredRef.current && runId && !companyGiaAvviata) {
      const lsKey = `grizzly_company_fired_${runId}`;
      if (localStorage.getItem(lsKey)) {
        // Già triggerato: reimposta il ref e non fare nulla
        companyCeckFiredRef.current = true;
        return;
      }
      companyCeckFiredRef.current = true;
      localStorage.setItem(lsKey, '1');
      fetchAzSenzaSito();
    }
    if (importFase?.stato !== "completato") {
      companyCeckFiredRef.current = false;
      setAzSenzaSito([]);
    }
  }, [fasi, fetchAzSenzaSito, runId]);

    const syncs = [500, 1500, 2500, 3500].map(delay =>

    return () => { clearTimeout(t); syncs.forEach(clearTimeout); };
  }, [fetchSheetStatus, fetchCounters]);

  useEffect(() => {

    const elaborando = dipFase?.stato === "in_corso" && dipFase?.dettaglio?.toLowerCase().includes("elabora");
    if (!elaborando) {
      if (dipFase?.stato !== "in_corso") { setDipIdle(false); setDipLastChange(null); }
      return;
    }
    // Prima volta che entra in elaborazione: inizializza il timer
    if (!dipLastChange) setDipLastChange(Date.now());
    fetchDipendentiCount();
    const t = setInterval(fetchDipendentiCount, 20000);
    return () => clearInterval(t);
  }, [fasi, fetchDipendentiCount, dipLastChange]);

  // Controlla idle ogni secondo — solo se elaborazione attiva

      const dipFase = fasi.find(f => f.id === "dipendenti");
      const elaborando = dipFase?.stato === "in_corso" && dipFase?.dettaglio?.toLowerCase().includes("elabora");
      if (!elaborando) return;
      if (dipLastChange && Date.now() - dipLastChange > 90000) {
        setDipIdle(true);
      }
    }, 1000);

    try {

      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      pushLog("ok",`✓ Make chiamato: ${label}`);
      return true;
    } catch(e) {
      // Make webhooks spesso non rispondono CORS dal browser — consideriamo ok se è un errore CORS
      if(e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        pushLog("ok",`✓ Richiesta inviata a Make: ${label} (attendi aggiornamento dal foglio)`);
        return true;
      }
      pushLog("error",`Errore Make (${label}): ${e.message}`);

      return false;
    }
  };

                        <button onClick={()=>continuaDopoUrl()} disabled={loading.continua} style={{padding:"7px 14px",fontSize:11,fontWeight:700,color:"#fff",background:loading.continua?"#1e2a3a":"linear-gradient(135deg,#ea580c,#f97316)",border:"none",borderRadius:5,cursor:loading.continua?"not-allowed":"pointer",width:120,textAlign:"center"}}>
                          {loading.continua?"...":"▶ Continua"}
                        </button>
                      </div>
                    </div>
                  )}
                  {fasi.find(f=>f.id==="dipendenti")&&dipIdle&&fasi.find(f=>f.id==="dipendenti")?.stato==="in_corso"&&(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <div style={{background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.35)",borderRadius:6,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:"#fb923c",marginBottom:2}}>👥 Cerca dipendenti</div>
                          <div style={{fontSize:10,color:C.muted}}>Controlla il foglio dipendenti, poi avvia la ricerca email</div>
                        </div>
                        <div style={{display:"flex",gap:8,flexShrink:0}}>
                          <button onClick={()=>openSheet(FASE_LINKS["dipendenti"].sheet,"Dipendenti")} style={{padding:"7px 12px",fontSize:11,fontWeight:600,color:C.accent,background:C.accentDim,border:`1px solid rgba(59,130,246,0.3)`,borderRadius:5,cursor:"pointer",width:130,textAlign:"center"}}>📊 Apri Dati</button>
                          <button
                            disabled={loading.avviaEmail}
                            onClick={async()=>{
                              setLoad("avviaEmail",true);
                              setDupCheck(null);
                              const result = await checkDuplicatiProPersona();
                              setDupCheck(result);
                              setLoad("avviaEmail",false);
                            }}
                            style={{padding:"7px 16px",fontSize:11,fontWeight:700,color:"#fff",background:loading.avviaEmail?"#1e2a3a":"linear-gradient(135deg,#ea580c,#f97316)",border:"none",borderRadius:5,cursor:loading.avviaEmail?"not-allowed":"pointer",width:180,textAlign:"center"}}>
                            {loading.avviaEmail?"⏳ Controllo...":dupCheck===null?"▶ Avvia cerca email":"🔍 Ricontrolla"}
                          </button>
                        </div>
                      </div>
                      {dupCheck?.ok===true&&(
                        <div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.35)",borderRadius:6,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:2}}>✅ Nessun duplicato trovato</div>
                            <div style={{fontSize:10,color:C.muted}}>Pro.Persona è pulito, puoi avviare la ricerca email</div>
                          </div>
                          <button onClick={()=>callMake("https://hook.eu2.make.com/htuzcpwibjxykcphlbvdh9agd946t28z",{},"Avvia Cerca Email").then(()=>{setFaseS("dipendenti","completato",{completato:new Date().toISOString()});setFaseS("email","in_corso",{iniziato:new Date().toISOString(),dettaglio:"Phantom Email avviato..."});setDipIdle(false);setDupCheck(null);pushLog("ok","▶ Cerca Email avviato");})} style={{padding:"7px 16px",fontSize:11,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#ea580c,#f97316)",border:"none",borderRadius:5,cursor:"pointer",width:180,textAlign:"center",flexShrink:0}}>▶ Avvia cerca email</button>
                        </div>
                      )}
                      {dupCheck?.ok===false&&(
                        <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:6,padding:"10px 14px"}}>
                          <div style={{fontSize:12,fontWeight:700,color:"#f87171",marginBottom:4}}>🚨 Profili duplicati in Pro.Persona</div>
                          <div style={{fontSize:10,color:C.muted,marginBottom:6}}>Rimuovi i duplicati dal foglio prima di avviare la ricerca email, altrimenti lo scenario si blocca.</div>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            {dupCheck.duplicati.map((d,i)=>(
                              <div key={i} style={{fontSize:10,color:"#fca5a5",fontFamily:"'JetBrains Mono',monospace"}}>• {d.url} <span style={{color:"#f87171"}}>({d.n}x)</span></div>
                            ))}
                          </div>
                          <div style={{marginTop:8,display:"flex",gap:8}}>
                            <a href="https://docs.google.com/spreadsheets/d/1y21r84H4Cy2J7hW-bLfXgsD5mfK8KqEcI_apcc_cm-E/edit?gid=811728725#gid=811728725" target="_blank" style={{textDecoration:"none"}}>
                              <button style={{padding:"5px 12px",fontSize:10,fontWeight:600,color:C.accent,background:C.accentDim,border:`1px solid rgba(59,130,246,0.3)`,borderRadius:4,cursor:"pointer"}}>📊 Apri Pro.Persona</button>
                            </a>
                            <button onClick={async()=>{setDupCheck(null);setLoad("avviaEmail",true);const result=await checkDuplicatiProPersona();setDupCheck(result);setLoad("avviaEmail",false);}} style={{padding:"5px 12px",fontSize:10,fontWeight:600,color:"#4ade80",background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:4,cursor:"pointer"}}>🔄 Ricontrolla</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                  {fasi.find(f=>f.id==="lemlist")?.stato==="attesa_utente"&&(
                    <div style={{background:"rgba(37,99,235,0.10)",border:`1px solid rgba(59,130,246,0.4)`,borderRadius:6,padding:"12px 16px",display:"flex",flexDirection:"column",gap:12}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:2}}>🚀 Assegna i lead alla campagna</div>
                          <div style={{fontSize:10,color:C.muted}}>Apri Lemlist e avvia le sequenze per i lead trovati</div>
                        </div>
                        <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"center"}}>
                          <a href="https://app-eu1.hubspot.com/contacts/145447510/objects/0-2/views/142976339/list" target="_blank" style={{textDecoration:"none"}}>
                            <button style={{padding:"7px 16px",fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#0f4c81,#0ea5e9)",border:"none",borderRadius:5,cursor:"pointer",textAlign:"center"}}>🔗 HubSpot</button>
                          </a>
                          <a href="https://app.lemlist.com/teams/tea_wT4jk7upASTbpAtjp/campaigns-next/cam_JZd5CAZbe39QDFzrr/leads" target="_blank" style={{textDecoration:"none",flexShrink:0}}>
                            <button style={{padding:"7px 16px",fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",border:"none",borderRadius:5,cursor:"pointer",textAlign:"center"}}>🚀 Lemlist</button>
                          </a>
                        </div>
                      </div>
                      {/* Tabs */}
                      <div style={{display:"flex",gap:6,borderBottom:`1px solid rgba(59,130,246,0.2)`,paddingBottom:6}}>
                        {[{k:"tabella",l:"📋 Tabella"},{k:"sheets",l:"📊 Google Sheets"}].map(t=>(
                          <button key={t.k} onClick={()=>{setProspectingTab(t.k);if(t.k==="tabella")fetchProspecting();}} style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:4,border:"none",cursor:"pointer",background:prospectingTab===t.k?"rgba(59,130,246,0.3)":"transparent",color:prospectingTab===t.k?"#93c5fd":C.muted}}>{t.l}</button>
                        ))}
                      </div>
                      {/* Tabella custom col B + E */}
                      {prospectingTab==="tabella"&&(
                        <div style={{overflowY:"auto",maxHeight:280,borderRadius:5,border:`1px solid rgba(59,130,246,0.2)`}}>
                          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                            <thead>
                              <tr style={{background:"rgba(59,130,246,0.15)"}}>
                                <th style={{padding:"6px 10px",textAlign:"left",color:"#93c5fd",fontWeight:700,borderBottom:`1px solid rgba(59,130,246,0.2)`,position:"sticky",top:0,background:"rgba(30,42,74,0.95)"}}>Ragione Sociale</th>
                                <th style={{padding:"6px 10px",textAlign:"left",color:"#93c5fd",fontWeight:700,borderBottom:`1px solid rgba(59,130,246,0.2)`,position:"sticky",top:0,background:"rgba(30,42,74,0.95)"}}>Company Page</th>
                                <th style={{padding:"6px 10px",textAlign:"left",color:"#93c5fd",fontWeight:700,borderBottom:`1px solid rgba(59,130,246,0.2)`,position:"sticky",top:0,background:"rgba(30,42,74,0.95)"}}>Sito Web</th>
                                <th style={{padding:"6px 10px",textAlign:"left",color:"#93c5fd",fontWeight:700,borderBottom:`1px solid rgba(59,130,246,0.2)`,position:"sticky",top:0,background:"rgba(30,42,74,0.95)"}}>Fatturato</th>
                              </tr>
                            </thead>
                            <tbody>
                              {prospectingRows.length===0
                                ?<tr><td colSpan={2} style={{padding:"14px 10px",textAlign:"center",color:C.muted}}>Caricamento...</td></tr>
                                :prospectingRows.map((r,i)=>(
                                  <tr key={i} onClick={()=>setProspectingSelected(s=>{const n=new Set(s);n.has(i)?n.delete(i):null;return n;})} style={{borderBottom:`1px solid rgba(59,130,246,0.1)`,background:prospectingSelected.has(i)?"rgba(16,185,129,0.15)":i%2===0?"transparent":"rgba(59,130,246,0.04)",cursor:"pointer",transition:"background 0.15s"}}>
                                    <td style={{padding:"5px 10px",color:prospectingSelected.has(i)?"#6ee7b7":C.text,fontWeight:prospectingSelected.has(i)?700:400}}>
                                      {prospectingSelected.has(i)&&<span style={{marginRight:6}}>✓</span>}{r.b}
                                    </td>
                                    <td style={{padding:"5px 10px",color:"#60a5fa",wordBreak:"break-all"}}>
                                      {r.e&&!r.e.toLowerCase().includes('verific')
                                        ?<a href={r.e} target="_blank" style={{color:prospectingSelected.has(i)?"#6ee7b7":"#60a5fa"}} onClick={e=>{e.stopPropagation();setProspectingSelected(s=>{const n=new Set(s);n.add(i);return n;});}}>{r.e.replace(/https?:\/\/(www\.)?/,"").slice(0,50)}</a>
                                        :"—"}
                                    </td>
                                    <td style={{padding:"5px 10px",color:C.muted,fontSize:9}}>
                                      {r.f?<a href={r.f.startsWith('http')?r.f:'https://'+r.f} target="_blank" style={{color:C.muted}} onClick={e=>e.stopPropagation()}>{r.f.replace(/https?:\/\/(www\.)?/,"").slice(0,30)}</a>:"—"}
                                    </td>
                                    <td style={{padding:"5px 10px",color:C.muted,fontSize:9,whiteSpace:"nowrap"}}>{r.s||"—"}</td>
                                  </tr>
                                ))
                              }
                            </tbody>
                          </table>
                        </div>
                      )}
                      {/* Google Sheets iframe */}
                      {prospectingTab==="sheets"&&(
                        <div style={{overflow:"hidden",height:320,borderRadius:5,border:`1px solid rgba(59,130,246,0.2)`}}>
                          <iframe
                            src={`https://docs.google.com/spreadsheets/d/${URL_SHEET_ID}/edit?gid=0&rm=minimal`}
                            style={{width:"133%",height:"133%",border:"none",transform:"scale(0.75)",transformOrigin:"top left"}}
                            title="Prospecting output"
                          />
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── IFRAME ── */}
                  {embedSheet&&(
                    <div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",padding:"6px 0 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span>{embedSheet.label}</span>
                        <div style={{display:"flex",gap:6}}>
                          <a href={embedSheet.editUrl} target="_blank" style={{textDecoration:"none"}}>
                            <button style={{fontSize:10,fontWeight:600,color:C.accent,background:C.accentDim,border:`1px solid rgba(59,130,246,.3)`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>✏ Modifica</button>
                          </a>
                          <button onClick={closeSheet} style={{fontSize:10,color:C.muted,background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 8px",cursor:"pointer"}}>✕ Chiudi</button>
                        </div>
                      </div>
                      <div style={{overflow:"hidden",height:320,borderRadius:6,border:`1px solid ${C.border}`}}>
                        <iframe src={embedSheet.url} style={{width:"133%",height:"133%",border:"none",transform:"scale(0.75)",transformOrigin:"top left"}} title={embedSheet.label}/>
                      </div>
                    </div>
                  )}

                  {/* ── LOG LIVE ── */}
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",maxHeight:220,overflowY:"auto"}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",padding:"7px 14px",borderBottom:`1px solid ${C.border}`}}>Log live</div>
                    {log.length===0
                      ?<div style={{padding:14,textAlign:"center",color:C.muted,fontSize:11}}>Nessun evento ancora</div>
                      :log.map((ev,i)=>{
                        const ec={ok:{c:C.green,icon:"✓"},warn:{c:C.yellow,icon:"⚠"},error:{c:C.red,icon:"✕"},info:{c:C.accent,icon:"i"},attesa:{c:C.orange,icon:"⏸"}}[ev.tipo]||{c:C.muted,icon:"·"};
                        return (
                          <div key={i} className="hovrow" style={{display:"flex",alignItems:"flex-start",gap:10,padding:"7px 14px",borderBottom:i<log.length-1?`1px solid ${C.border}`:"none"}}>
                            <div style={{width:14,height:14,borderRadius:"50%",background:`${ec.c}18`,border:`1px solid ${ec.c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:ec.c,flexShrink:0,marginTop:2}}>{ec.icon}</div>
                            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.muted,whiteSpace:"nowrap",flexShrink:0,marginTop:1}}>{fmtTime(ev.ts)}</span>
                            <span style={{fontSize:11,color:ev.tipo==="error"?C.red:ev.tipo==="attesa"?C.orange:ev.tipo==="warn"?C.yellow:C.text,lineHeight:1.4}}>{ev.msg}</span>
                          </div>
                        );
                      })
                    }
                  </div>

                </div>
              </>
            )}
          </div>
        )}

        
        {/* ══ ERRORI ══ */}
        {tab==="errori"&&(
          <div style={{padding:"16px 20px",animation:"fadeIn .2s ease"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div><div style={{fontSize:18,fontWeight:700,color:C.textHi,marginBottom:4}}>Errori pipeline</div><div style={{fontSize:12,color:C.muted}}>Da Prospecting_output ed Email_verificate</div></div>
              <div style={{display:"flex",gap:8}}><Tag color={C.red} bg={C.redDim}>{openErrors} aperti</Tag><Tag color={C.green} bg={C.greenDim}>{errori.filter(e=>e.stato==="risolto").length} risolti</Tag></div>
            </div>
            {errori.map(err=>{
              const done=err.stato==="risolto";
              const tc={INVALID_DOMAIN:{c:C.yellow,bg:C.yellowDim,icon:"🔗"},MISSING_DEAL_ID:{c:C.red,bg:C.redDim,icon:"🔧"}}[err.tipo]||{c:C.muted,bg:"transparent",icon:"?"};
              return (
                <div key={err.id} className="hcard" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginBottom:10,opacity:done?.5:1}}>
                  <div style={{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:14}}>
                    <div style={{width:36,height:36,background:tc.bg,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{tc.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontWeight:600,fontSize:13,color:C.textHi}}>{err.azienda}</span>
                        <Tag color={tc.c} bg={tc.bg}>{err.tipo}</Tag>
                        <span style={{fontSize:10,color:C.muted}}>{err.scenario}</span>
                      </div>
                      <div style={{fontSize:11,color:C.muted,lineHeight:1.5,marginBottom:8}}>{err.msg}</div>
                      {!done&&<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px"}}><div style={{fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:C.muted,marginBottom:4}}>COME RISOLVERE</div><div style={{fontSize:11,color:C.text,lineHeight:1.6}}>{err.fix}</div></div>}
                    </div>
                    {!done?<Btn color={C.green} bg={C.greenDim} border="rgba(34,197,94,.4)" onClick={()=>closeError(err.id)}>✓ Risolto</Btn>:<Tag color={C.green} bg={C.greenDim}>✓ Chiuso</Tag>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ LOG ══ */}
        {tab==="log"&&(
          <div style={{padding:24,animation:"fadeIn .2s ease"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",marginBottom:12}}>Log eventi {runId?`— ${runId}`:"— nessun run attivo"}</div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
              {log.length===0?<div style={{padding:20,textAlign:"center",color:C.muted,fontSize:11}}>Nessun evento — avvia un run</div>
               :log.map((ev,i)=>{
                const ec={ok:{c:C.green,icon:"✓"},warn:{c:C.yellow,icon:"⚠"},error:{c:C.red,icon:"✕"},info:{c:C.accent,icon:"i"},attesa:{c:C.orange,icon:"⏸"}}[ev.tipo]||{c:C.muted,icon:"·"};
                return (
                  <div key={i} className="hovrow" style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 16px",borderBottom:i<log.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:`${ec.c}18`,border:`1px solid ${ec.c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:ec.c,flexShrink:0,marginTop:2}}>{ec.icon}</div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.muted,whiteSpace:"nowrap",flexShrink:0,marginTop:1}}>{fmtTime(ev.ts)}</span>
                    <span style={{fontSize:12,color:ev.tipo==="error"?C.red:ev.tipo==="attesa"?C.orange:ev.tipo==="warn"?C.yellow:C.text,lineHeight:1.5}}>{ev.msg}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:20,right:20,zIndex:999,background:C.surfaceHi,border:`1px solid ${C.borderHi}`,borderLeft:`3px solid ${toast.color}`,borderRadius:6,padding:"11px 16px",fontSize:12,color:C.textHi,animation:"slideUp .2s ease",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          {toast.msg}
        </div>
      )}
    </div>

      {showReviewTool&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:1000,background:"rgba(0,0,0,0.85)",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"#0d1117",borderBottom:"1px solid rgba(255,255,255,0.1)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:14}}>🔍</span>
              <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Rivedi URL ambigui</span>
              <span style={{fontSize:11,color:"#4a6080",background:"rgba(255,255,255,0.05)",padding:"2px 8px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>Prospecting output</span>
            </div>
            <button onClick={()=>setShowReviewTool(false)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:6,padding:"5px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Chiudi</button>
          </div>
          {reviewBlobUrl&&<iframe src={reviewBlobUrl} style={{flex:1,border:"none",width:"100%"}} sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"/>}
        </div>
      )}
  );
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
